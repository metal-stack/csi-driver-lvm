apiVersion: v1
kind: Pod
metadata:
  name: pod-replicated-raw
  labels:
    name: busybox-replicated-raw
spec:
  restartPolicy: Always
  containers:
    - image: gcr.io/google_containers/busybox
      command: ["/bin/sh", "-c"]
      args: [ "tail -f /dev/null" ]
      name: busybox
      volumeDevices:
        - name: vol
          devicePath: /dev/xdva
  volumes:
    - name: vol
      persistentVolumeClaim:
        claimName: pvc-replicated-raw
