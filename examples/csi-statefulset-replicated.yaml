---
apiVersion: v1
kind: Service
metadata:
  name: nginx-replicated
  labels:
    app: nginx-replicated
spec:
  ports:
  - port: 80
    name: web
  clusterIP: None
  selector:
    app: nginx-replicated
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-replicated
  labels:
    app: nginx-replicated
spec:
  serviceName: "nginx-replicated"
  replicas: 1
  selector:
    matchLabels:
      app: nginx-replicated
  template:
    metadata:
      labels:
        app: nginx-replicated
      annotations:
        metal-stack.io/csi-driver-lvm.is-eviction-allowed: "true"
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: "/data"
          name: data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: csi-driver-lvm-replicated
      resources:
        requests:
          storage: 1Gi
