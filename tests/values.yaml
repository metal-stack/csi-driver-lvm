---
pluginImage:
  repository: csi-driver-lvm
  tag: latest
  pullPolicy: IfNotPresent

provisionerImage:
  repository: csi-driver-lvm-provisioner
  tag: latest
  pullPolicy: IfNotPresent

lvm:
  devicePattern: /dev/loop100,/dev/loop101
  logLevel: debug

storageClasses:
  linearEncrypted:
    enabled: true
  stripedEncrypted:
    enabled: true
  mirrorEncrypted:
    enabled: true
