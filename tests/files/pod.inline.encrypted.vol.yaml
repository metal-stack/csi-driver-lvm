kind: Pod
apiVersion: v1
metadata:
  name: volume-test-inline-encrypted
spec:
  containers:
  - name: inline
    image: alpine
    imagePullPolicy: IfNotPresent
    command:
      - sh
      - -c
      - echo "ephemeral-encrypted-ok" > /data/test.txt && tail -f /etc/hosts
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 10014
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    volumeMounts:
    - mountPath: "/data"
      name: lvm-pvc-inline-encrypted
    resources:
      limits:
        cpu: 100m
        memory: 100M
  volumes:
    - name: lvm-pvc-inline-encrypted
      csi:
        driver: lvm.csi.metal-stack.io
        volumeAttributes:
          size: "100Mi"
          type: "linear"
          encryption: "true"
        nodePublishSecretRef:
          name: csi-lvm-encryption-secret
