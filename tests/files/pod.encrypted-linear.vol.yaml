apiVersion: v1
kind: Pod
metadata:
  name: volume-test-encrypted
spec:
  containers:
  - name: volume-test-encrypted
    image: alpine
    imagePullPolicy: IfNotPresent
    command:
      - tail
      - -f
      - /etc/hosts
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 10014
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    volumeMounts:
    - name: encrypted-linear
      mountPath: /encrypted
    resources:
      limits:
        cpu: 100m
        memory: 100M
  volumes:
  - name: encrypted-linear
    persistentVolumeClaim:
      claimName: lvm-pvc-encrypted-linear
