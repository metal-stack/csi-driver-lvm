apiVersion: v1
kind: Pod
metadata:
  name: volume-reading-test
spec:
  containers:
  - name: volume-reading-test
    image: alpine
    imagePullPolicy: IfNotPresent
    command:
      - tail
      - -f
      - /remount/output.log
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 10014
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    volumeMounts:
    - name: remount
      mountPath: /remount
    resources:
      limits:
        cpu: 100m
        memory: 100M
  volumes:
  - name: remount
    persistentVolumeClaim:
      claimName: lvm-pvc-remount
